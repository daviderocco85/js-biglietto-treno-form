<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Boostrap link-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    
    <link rel="icon" type="image/png"  href="assets/img/ItalRail-icon.png">

    <!--CSS link-->
    <link rel="stylesheet" href="style.css">

    <title>JS Biglietto Treno Form</title>
</head>
<body>
    
    <!-- NAVBAR SUPERIORE -->
    <header>
        <nav class="navbar navbar-dark bg-dark shadow-sm navbar-tight">
            <div class="container d-flex justify-content-center">
                <a class="navbar-brand d-flex align-items-center gap-3" href="#">
                    <img src="assets/img/ItalRail_logo.png" class="logo-navbar">        
                </a>
            </div>
        </nav>
    </header>

    <!-- SFONDO GRIGIO APP -->
    <main>
        <div class="bg-light min-vh-100 py-5">

            <div class="container">

                <div class="row justify-content-center">
                    <div class="col-lg-6">

                        <!-- CARD FORM -->
                        <div class="card shadow-sm border-0">
                            <div class="card-body p-4">

                                <h1 class="fs-3 fw-semibold text-center mb-4">
                                    ItalRail – Calcola il tuo biglietto
                                </h1>

                                <form class="row g-4 needs-validation" novalidate>

                                    <!-- KM -->
                                    <div class="col-12">
                                        <label for="kmTraveled" class="form-label fw-semibold">
                                            Km da percorrere
                                        </label>

                                        <div class="input-group has-validation">
                                            <span class="input-group-text">
                                                <i class="bi bi-signpost-split"></i>
                                            </span>
                                            <input type="text" class="form-control" id="kmTraveled" placeholder="Es. 120.5">
                                            <div class="invalid-feedback">Inserisci un numero valido</div>   
                                        </div> 
                                                                
                                    </div>
                                

                                    <!-- ETA -->
                                    <div class="col-12">
                                        <label for="passengerAge" class="form-label fw-semibold">
                                            Età passeggero
                                        </label>

                                        <div class="input-group has-validation">
                                            <span class="input-group-text">
                                                <i class="bi bi-person-fill"></i>
                                            </span>
                                            <input type="text" class="form-control" id="passengerAge" placeholder="Es. 35">
                                            <div class="invalid-feedback">Inserisci un'età valida (solo numeri interi)</div>
                                        </div>   
                                        
                                    </div>
                                    

                                    <!-- BOTTONE -->
                                    <div class="col-12 pt-2">
                                        <button class="btn btn-primary w-100 py-2 fs-5" type="button" id="submit">
                                            Calcola
                                        </button>
                                    </div>

                                </form>
                            </div>
                        </div>

                        <!-- RISULTATO -->
                        <div id="resultCardContainer"></div>

                    </div>
                </div>

            </div>
        </div>
    </main> 

    <footer class="app-footer">
        ItalRail 2026 — Nome di fantasia, non associato a marchi registrati.
    </footer>

    <script src="script.js"></script>
</body>
</html>
